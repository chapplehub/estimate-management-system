name: Playwright Tests
on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "prisma/**"
      - "prisma.config.ts"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "postcss.config.mjs"
      - "components.json"
      - "public/**"
      - ".github/workflows/playwright.yml"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # PostgreSQLサービスコンテナ
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # ヘルスチェック（PostgreSQL起動完了まで待機）
        # -U postgres を明示し、ロール未指定時の "role root does not exist" ログノイズを抑止
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 全ステップ共通の環境変数
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      BETTER_AUTH_SECRET: test-secret-for-ci-only
      BETTER_AUTH_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright バージョンをキャッシュキーに使うため取得（信頼できる自前出力のみ）
      - name: Get Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      # ブラウザ本体をキャッシュし、CDN への再ダウンロード依存を減らす
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run database migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed database for E2E tests
        run: pnpm e2e:seed

      # キャッシュヒット時はブラウザ本体DLを省略しOS依存パッケージのみ入れる。
      # CDN ストール時に44分待たず早期失敗させるため timeout-minutes を設定。
      - name: Install Playwright Browsers
        timeout-minutes: 10
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps chromium
          else
            pnpm exec playwright install --with-deps chromium
          fi

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
