name: Playwright Tests
on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "prisma/**"
      - "prisma.config.ts"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "postcss.config.mjs"
      - "components.json"
      - "public/**"
      - ".github/workflows/playwright.yml"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # PostgreSQLサービスコンテナ
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # ヘルスチェック（PostgreSQL起動完了まで待機）
        # -U postgres を明示し、ロール未指定時の "role root does not exist" ログノイズを抑止
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 全ステップ共通の環境変数
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      BETTER_AUTH_SECRET: test-secret-for-ci-only
      BETTER_AUTH_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          # Node 24.16.0 で Playwright(1.58) の "extracting archive" がハングするため、
          # 先週まで lts/* が解決していた既知良好版に固定する（浮動による非決定性を排除）。
          # 参照: docs/claude-plans/issue-284/deviations.md / CI 調査ログ
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run database migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed database for E2E tests
        run: pnpm e2e:seed

      # 【一時的な診断】install ハングの切り分け用。原因確定後に削除する
      - name: Disk space before install
        run: df -h /

      # CDN ストール等で固まった際、ジョブ全体(60分)を待たず早期失敗させる安全網。
      # DEBUG=pw:install は download/extract のどの段で固まるか可視化する一時診断。
      - name: Install Playwright Browsers
        timeout-minutes: 10
        env:
          DEBUG: pw:install
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
